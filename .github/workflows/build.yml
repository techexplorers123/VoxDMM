name: Build and Release APK

on:
    push:
        tags:
            - "v*.*.*"
permissions:
    contents: write
jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK 24
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "24"

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  channel: "stable"
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Setup keystore
              run: |
                  echo "$KEYSTORE_BASE64" | base64 --decode > ./android/release-key.jks
              env:
                  KEYSTORE_BASE64: ${{secrets.KEYSTORE_BASE64}}

            - name: Create key.properties
              run: |
                  echo "storePassword=$KEYSTORE_PASSWORD" >> android/key.properties
                  echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
                  echo "keyAlias=$KEY_ALIAS" >> android/key.properties
                  echo "storeFile=../release-key.jks" >> android/key.properties
              env:
                  KEYSTORE_PASSWORD: ${{secrets.KEYSTORE_PASSWORD}}
                  KEY_ALIAS: ${{secrets.KEY_ALIAS}}
                  KEY_PASSWORD: ${{secrets.KEYSTORE_PASSWORD}}

            - name: Build release APK
              run: flutter build apk --release&&flutter appbundle --release

            - name: Rename APK
              run: mv build/app/outputs/flutter-apk/app-release.apk VoxDMM-release-${{ github.ref_name }}.apk&&mv build/app/outputs/bundle/release/app-release.aab VoxDMM-release-${{ github.ref_name }}.aab
            - name: Create Release & Upload APK
              uses: softprops/action-gh-release@v2
              with:
                  files: VoxDMM-release-${{ github.ref_name}}.*
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
