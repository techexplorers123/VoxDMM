name: voxdmm
description: "an app to  make bluetooth  multimeters accessible for blind through voice. Currently only zotk's multimeter's are supported"
publish_to: "none"
version: 0.1.0+1

environment:
    sdk: ^3.11.5

dependencies:
    flutter:
        sdk: flutter

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^6.0.0
    flutter_launcher_icons: any
    names_launcher: any

flutter:
    uses-material-design: true
